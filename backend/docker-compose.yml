version: "3.9"

services:
  # ── API Server ────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: ielts_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/ielts_platform
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ielts_net

  # ── Feedback Worker ────────────────────────────────────────────────────────
  worker:
    build: .
    container_name: ielts_worker
    restart: unless-stopped
    command: node src/workers/feedbackWorker.js
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/ielts_platform
      - REDIS_URL=redis://redis:6379
      - WORKER_CONCURRENCY=3
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ielts_net

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ielts_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ielts_net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ielts_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ielts_net

volumes:
  mongo_data:
  redis_data:

networks:
  ielts_net:
    driver: bridge
